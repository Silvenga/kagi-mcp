name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: Mozilla-Actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Check formatting
        run: cargo fmt --all --check
      - name: Run clippy
        run: cargo clippy --workspace --all-targets --all-features -- -A dead_code
      - name: Test
        run: cargo test --workspace --all-features --no-fail-fast

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    needs: check
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: Mozilla-Actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: kagi-mcp-linux
          path: target/release/kagi-mcp

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    needs: check
    env:
      SCCACHE_GHA_ENABLED: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: Mozilla-Actions/sccache-action@v0.0.9
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
      - name: Build
        run: cargo build --release
      - uses: actions/upload-artifact@v7
        with:
          name: kagi-mcp-windows
          path: target/release/kagi-mcp.exe
