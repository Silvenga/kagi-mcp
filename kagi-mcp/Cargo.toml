[package]
name = "kagi-mcp"
version = "0.1.0"
description = "MCP server for the Kagi Search API"
edition.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true
homepage.workspace = true
documentation.workspace = true
readme = "README.md"
keywords = ["kagi", "mcp", "search", "cli"]
categories = ["command-line-utilities", "web-programming::http-client"]
rust-version.workspace = true

[dependencies]
kagi-api = { path = "../kagi-api" }
rmcp = { version = "1.6", features = ["server", "client", "transport-io", "transport-async-rw", "schemars"] }
tokio = { workspace = true, features = ["io-std", "io-util"] }
tokio-util = "0.7"
clap = { workspace = true }
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
schemars = { workspace = true }
url = { workspace = true }
thiserror = { workspace = true }
anyhow = { workspace = true }
async-trait = { workspace = true }

[dev-dependencies]
mockall = { workspace = true }
kagi-api = { path = "../kagi-api", features = ["mock"] }
wiremock = "0.6"
