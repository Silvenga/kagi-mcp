openapi: 3.0.0
servers:
  - url: https://kagi.com/api/v1
    description: Production api endpoint
info:
  title: Kagi API
  version: '1'
  description: >
    The Kagi API provides programmatic access to data that powers our search
    results & more. 


    Get started on the [API Dashboard](https://kagi.com/api) to set up billing,
    manage API keys, and more.


    See our [API Pricing](https://kagi.com/api/pricing) page for standard rates.


    ### Official Client Libraries


    We offer the following libraries you can use to interact with the Kagi API.
    These are generated from an OpenAPI spec.


    - [Golang](https://github.com/kagisearch/kagi-openapi-golang)

    - [Python](https://github.com/kagisearch/kagi-openapi-python)

    - [TypeScript](https://github.com/kagisearch/kagi-openapi-typescript)

    - [Rust](https://github.com/kagisearch/kagi-openapi-rust)


    If you have a language you would like to use and it's not in the list, send
    us a message and we will add it to the list if it is supported. Or you can
    use the [spec](https://kagi.redocly.app/_spec/openapi.yaml?download) to
    build your own custom library.


    In the future we will most likely offer more crafted API wrappers and
    spotlight clients and applications built by our community - feel free to
    send them to us!


    ### MCP


    We offer a hosted MCP server at: https://mcp.kagi.com/mcp


    At this time, we do not support setup via OAuth2 flow, but this is on our
    roadmap. You will need to get your [API key from the
    dashboard](https://kagi.com/api/keys) and plug it into your local client
    with `Bearer` HTTP authentication.


    Here is an example to get started with Claude Code:


    ```

    claude mcp add kagi https://mcp.kagi.com/mcp --transport http --header
    "Authorization: Bearer $(read -sp 'API key: ' k; echo $k)" --scope user

    ```


    You can review and contribute to our [MCP server on
    GitHub](https://github.com/kagisearch/kagimcp/tree/rehan/v1-api)!


    ### Support


    For bug reports, feature requests, or billing related issues please reach
    out to [developers@kagi.com](mailto:developers@kagi.com) and we will be
    happy to assist you.


    To help us answer your reports efficiently, please be prepared to provide as
    much info as you can:


    - For bugs, include request trace IDs from the `meta.trace` response field
    or the `X-Kagi-Trace` response header.

    - If issues are easily reproduced in our
    [playground](https://kagi.com/api/playground/search), send us a link to the
    playground - the URL will contain parameters to configure the request so
    that we can reproduce ourselves.

    - Include any code snippets or precise descriptions of the request you are
    making, and full samples of the response bodies from the API

    - Include mention of which wrapper you are using if any, or links to
    relevant application code we can review

    - Include the email address associated with your Kagi login if it is not the
    one you are emailing from


    Thank you!


    ### Discord


    Join our [Discord](https://kagi.com/discord)! Good for quick questions or
    chatting about things you've made with our APIs!


    In the server you will find the `#api` forum for API related inquiries.
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
  contact:
    name: API Support
    email: developers@kagi.com
paths:
  /search:
    post:
      security:
        - kagi: []
      tags:
        - Search
      summary: Perform a web search
      operationId: search
      requestBody:
        required: true
        content:
          application/json:
            schema:
              description: Used to upload the search query
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Search query to run.
                workflow:
                  type: string
                  description: Type of results to return.
                  default: search
                  enum:
                    - search
                    - images
                    - videos
                    - news
                    - podcasts
                format:
                  type: string
                  description: >-
                    **(EXPERIMENTAL)** Format to serialize the API response as.
                    The exact contents and structure of markdown output is still
                    being worked on - please send your feedback!
                  default: json
                  enum:
                    - json
                    - markdown
                lens_id:
                  type: string
                  description: >-
                    Lens to apply to the search. Can be a built-in lens's
                    identifier or a lens ID as shown on
                    https://kagi.com/settings/lenses when a lens is set to be
                    shareable. Can be just the ID portion of the URL
                    (`https://kagi.com/lenses/ID`) or the full URL.
                lens:
                  type: object
                  description: >-
                    Inline description of a lens to apply to the search. Options
                    supplied by the lens take precedence over those supplied by
                    the user in their search terms (e.g., `site:` operators),
                    allowing you to restrict the scope of the search to return
                    more relevant results in specific applications.
                  properties:
                    sites_included:
                      type: array
                      description: Search only these domains.
                      items:
                        description: domains
                        type: string
                    sites_excluded:
                      type: array
                      description: Exclude these domains from the search.
                      items:
                        description: domains
                        type: string
                    keywords_included:
                      type: array
                      description: Return only results containing these keywords.
                      items:
                        description: keywords
                        type: string
                    keywords_excluded:
                      type: array
                      description: Exclude results containing these keywords.
                      items:
                        description: keywords
                        type: string
                    file_type:
                      type: string
                      description: A specific file type to search for. (e.g., `pdf`)
                    time_after:
                      type: string
                      description: >-
                        Filters for web pages that have been updated or
                        published *after* the given date.
                      format: date
                    time_before:
                      type: string
                      description: >-
                        Filters for web pages that have been updated or
                        published *before* the given date.
                      format: date
                    time_relative:
                      type: string
                      description: >-
                        Filters for web pages that have been updated or
                        published in the given interval, relative to today's
                        date.
                      enum:
                        - day
                        - week
                        - month
                    search_region:
                      type: string
                      description: >-
                        Requests results localized to a specific region. Can be
                        any valid [ISO-3166-1 Alpha-2 country
                        code](https://en.wikipedia.org/wiki/ISO_3166-1_alpha-2#Officially_assigned_code_elements),
                        or the special value `no_region`, that will try to get
                        the most general results possible.
                timeout:
                  type: number
                  minimum: 0.5
                  maximum: 4
                  description: >-
                    Number of seconds to allow for collecting search results.
                    Lower values will return results more quickly, but may be
                    lower quality or inconsistent between calls. If omitted,
                    will use the latest recommended value by Kagi.
                page:
                  type: integer
                  minimum: 1
                  maximum: 10
                  description: Page number for paginated results. Must be between 1 and 10.
                limit:
                  type: integer
                  minimum: 1
                  maximum: 1024
                  description: >
                    Maximum number of results to return. Must be between 1 and
                    1024. 

                    **NOTE:** This does not change the amount of results
                    requested, it only limits the maximum amount returned. If
                    omitted, the API always gives you the most results we can
                    get in a single pass.
                filters:
                  type: object
                  description: >
                    Filters to apply to search results for more targeted
                    queries.


                    **NOTE:** Any parameter here that overlaps with lenses will
                    take priority over the lens.
                  properties:
                    region:
                      type: string
                      description: >-
                        Filter results to a specific region using an ISO 3166-1
                        Alpha-2 country code. See
                        https://help.kagi.com/api/regions for supported codes.
                    after:
                      type: string
                      description: Filter for results published or updated after this date.
                      format: date
                    before:
                      type: string
                      description: >-
                        Filter for results published or updated before this
                        date.
                      format: date
                extract:
                  type: object
                  description: >
                    Configuration for extracting page content from search
                    results. When provided, the API will fetch and extract the
                    content from the specified number of result pages.


                    The resulting page markdown will update the value of the
                    `snippet` field on the respective result item.


                    **NOTE:** Use of this option incurs additional cost, billed
                    at your account's rate for the Extract API based on the
                    number of units requested. You will not be charged if there
                    were no results to extract.
                  properties:
                    count:
                      type: integer
                      minimum: 1
                      maximum: 10
                      description: >-
                        Number of search results to extract content from. Must
                        be between 1 and 10.
                    timeout:
                      type: number
                      minimum: 0.5
                      maximum: 4
                      description: >-
                        Timeout in seconds for extraction of each page. If
                        omitted, uses the default timeout. This time budget is
                        in addition to the allocated top-level search timeout,
                        so that you can control both independently.
                safe_search:
                  type: boolean
                  description: >-
                    Whether safe search is enabled, omitting potentially NSFW
                    content.
                  default: true
                personalizations:
                  type: object
                  description: >-
                    Personalization rules to customize search result ranking.
                    Allows specifying domain biases and regex-based
                    replacements.
                  properties:
                    domains:
                      type: array
                      description: >-
                        Domain-level personalization rules (maximum 1000 rules).
                        Each rule can boost or lower the ranking of results from
                        specific domains.
                      items:
                        type: object
                        required:
                          - domain
                          - kind
                        properties:
                          domain:
                            type: string
                            description: >-
                              Domain pattern to personalize (e.g.,
                              "example.com"). Can also be a tld suffix like
                              ".co.uk".
                          kind:
                            type: string
                            description: Handling mode for this domain pattern
                            enum:
                              - block
                              - lower
                              - raise
                              - pin
                    regexes:
                      type: array
                      description: >-
                        Regex-based personalization rules (maximum 1000 rules,
                        max 1000 bytes per pattern).
                      items:
                        type: object
                        properties:
                          regex:
                            type: string
                            description: The regex pattern to match.
                            example: ^https?://(www\.)?reddit\.com.*
                          replacement:
                            type: string
                            description: >-
                              The replacement string to apply when the pattern
                              matches. Will preserve paths and query parameters
                              if not overwritten. You can refer to capture
                              groups with "$1", "$2", etc.
                            example: https://old.reddit.com
            examples:
              basicSearch:
                summary: Basic search query
                description: Simple search showing how to use the search API
                value:
                  query: steve jobs
                  workflow: search
              snapSearch:
                summary: Search with snaps
                description: Snaps are supported for quickly searching in individual sites
                value:
                  query: '@r headphones'
                  workflow: search
              imageSearch:
                summary: Search just for images
                description: >-
                  Searching just for images, or other categories is supported
                  using the workflow parameter
                value:
                  query: doggo
                  workflow: images
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                description: A response with a description and results references used
                type: object
                properties:
                  meta:
                    $ref: '#/components/schemas/meta'
                  data:
                    description: >-
                      Holds all the search results for the query specified. As
                      results have different types and sources, they are
                      separated into different fields within this object. For
                      example image results are stored under `data.image` while
                      news results are stored under `data.news`. All results
                      will have the same main structure, but additional data
                      might be stored under the `data.{name}[].props` path.
                      Please look at each different type of result for more
                      information about this.
                    type: object
                    properties:
                      search:
                        description: >-
                          Contains all search results for html pages or
                          websites.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      image:
                        description: Contains all search results for images.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      video:
                        description: Contains all search results for videos.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      podcast:
                        description: Contains all search results for podcasts.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      podcast_creator:
                        description: Contains all search results for creators of podcasts.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      news:
                        description: Contains all search results for news articles.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      adjacent_question:
                        description: >-
                          Contains results that are obtained by searching for
                          slightly different queries. These questions are stored
                          under the `props.question` path.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      direct_answer:
                        description: >-
                          If the search query was a math equation, or unit
                          conversions, things that can be answered quickly, the
                          result will be in here.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      interesting_news:
                        description: >-
                          Contains news results from publishers collected and
                          stored in Kagi's news index.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      interesting_finds:
                        description: >-
                          Contains small web results from publishers collected
                          and stored in Kagi's small web index.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      infobox:
                        description: >-
                          Contains detailed summary and tabulated information
                          about a person, place, or thing.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      code:
                        description: >-
                          Contains all search results that link to code
                          resources or repositories.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      package_tracking:
                        description: >-
                          If the search query was a package tracking number, the
                          correct package tracking website should be present in
                          this collection.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      public_records:
                        description: >-
                          Contains all search results for public records, such
                          as government documents or public court records.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      weather:
                        description: Contains all search results for the current weather.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      related_search:
                        description: >-
                          Contains a list of searches that are related to the
                          current search, and may help narrow down the results.
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      listicle:
                        description: >-
                          Contains all search results that are lists of things.
                          Results with titles like "5 things you didn't know
                          about...", or "10 of the best headphones".
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
                      web_archive:
                        description: >-
                          Contains all search results for archived websites that
                          may not be available anymore
                        type: array
                        items:
                          $ref: '#/components/schemas/searchResult'
              examples:
                default:
                  summary: Response with example search objects
                  value:
                    meta:
