  /extract:
    post:
      security:
        - kagi: []
      tags:
        - Extract
      summary: Extract page content as markdown from URLs
      description: >
        Extracts markdown content from up to 10 HTTP(s) URLs. Each URL is
        processed

        and the extracted content is returned in the response.
      operationId: extractContent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/extractRequest'
            examples:
              basicExtract:
                summary: Extract from multiple URLs
                description: Request to extract content from up to 10 web pages
                value:
                  pages:
                    - url: https://example.com/article1
                    - url: https://example.com/article2
                  timeout: 1.337
                  format: json
      responses:
        '200':
          description: Successful extraction
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/extractResponse'
              examples:
                default:
                  summary: Successful extraction response
                  value:
                    meta:
                      trace: abc123def456
                      ms: 1250
                      node: us-east-1
                    data:
                      - url: https://example.com/article
                        markdown: |-
                          # Article Title

                          This is the extracted content...
            text/markdown:
              schema:
                type: string
                description: Plain markdown extracted content without JSON wrapper
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorEnvelope'
        '401':
          $ref: '#/components/responses/unauthorized'
        '403':
          description: Forbidden - IP address not authorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorEnvelope'
        '429':
          description: Rate limited or usage limit exhausted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorEnvelope'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorEnvelope'
components:
  securitySchemes:
    kagi:
      type: http
      scheme: bearer
      description: Kagi API key from https://kagi.com/api/keys
  schemas:
    meta:
      description: >-
        This object is subject to change as it is provided for debugging
        purposes. Fields may be added or removed as required. Don't build any
        hard dependancies on any of this data.
      type: object
      properties:
        trace:
          type: string
          description: >-
            Trace ID that can be used to debug individual API requests. Provide
            this, if needed, when contacting Kagi support.
        node:
          type: string
          description: The hostname of the node that fulfilled the request.
        ms:
          type: integer
          description: >-
            how long the request took to fulfill, excluding round trip to the
            client.
      additionalProperties: true
    searchResult:
      description: A search result that fulfills the query sent to the kagi API
      type: object
      required:
        - url
        - title
      properties:
        url:
          description: >-
            The location of the result. This is the direct URL to the resource
            that matches the query
          type: string
          example: https://en.wikipedia.org/wiki/Steve_Jobs
        title:
          description: >-
            This is the title of the resource. For HTML documents, it reflects
            `<title>`. For videos, it is the name that would be displayed on the
            video site.
          type: string
          example: Steve Jobs - Wikipedia
        snippet:
          description: A short summary of the contents of the resource
          type: string
          example: >-
            Steven Paul Jobs (February 24, 1955 – October 5, 2011) was an
            American businessman, inventor, and investor best known for
            co-founding the ...
        time:
          description: The date when the resource was created or last updated.
          type: string
          example: '2024-11-29T03:54:26Z'
        image:
          description: >-
            An image that goes with the main resource. It could be a video's
            thumbnail or an HTML document's main image.
          type: object
          required:
            - url
          properties:
            url:
              description: >-
                This is a URL that links directly to the image that goes with
                the resources.
              type: string
              example: >-
                https://upload.wikimedia.org/wikipedia/commons/thumb/d/dc/Steve_Jobs_Headshot_2010-CROP_%28cropped_2%29.jpg/330px-Steve_Jobs_Headshot_2010-CROP_%28cropp   
                ed_2%29.jpg
            height:
              description: The height of the image.
              type: integer
              example: 300
            width:
              description: The width of the image.
              type: integer
              example: 310
        props:
          type: object
          description: Holds arbitrary result metadata
          additionalProperties: true
    errorDetail:
      type: object
      description: API error response for Extract operations
      required:
        - code
        - url
      properties:
        code:
          type: string
          description: Namespaced error code
          example: extract.invalid_url
        url:
          type: string
          format: uri
          description: >
            URL to error documentation.


            **NOTE:** These URLs are still a work in progress and will currently
            return a 404 error. These will be updated to real URLs as the
            preview period continues.
          example: https://help.kagi.com/api/errors#extract.invalid_url
        message:
          type: string
          description: Human-readable error message
          example: URL must be a valid HTTPS URL
          nullable: true
        location:
          type: string
          description: Field location where the error occurred
          example: pages[0].url
          nullable: true
    errorEnvelope:
      type: object
      description: >-
        API error response envelope containing metadata and an array of error
        details
      required:
        - meta
        - error
      properties:
        meta:
          $ref: '#/components/schemas/meta'
        data:
          type: array
          description: Empty data array when error occurs
          items: {}
          nullable: true
        error:
          type: array
          description: Array of error detail objects describing what went wrong
          items:
            $ref: '#/components/schemas/errorDetail'
    pageInput:
      type: object
      description: A single page to extract content from
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: |
            The HTTPS URL of the page to extract content from.
            Must use HTTPS scheme with a valid host.
          example: https://example.com/article
    extractRequest:
      type: object
      description: Request body for content extraction
      required:
        - pages
      properties:
        pages:
          type: array
          description: |
            Array of pages to extract content from. Must contain 1-10 URLs.
            Each URL must be a valid HTTPS URL.
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/pageInput'
        timeout:
          type: number
          format: float
          minimum: 0.5
          maximum: 10
          description: >
            Optional timeout in seconds for the extraction operation. Out of
            range values will be clamped back within range.


            All URLs are fetched concurrently. This timeout applies a time
            budget for the entire bulk fetch operation.
          example: 1.337
        format:
          type: string
          description: >-
            **(EXPERIMENTAL)** Format to serialize the API response as. The
            exact contents and structure of markdown output is still being
            worked on - please send your feedback!
          enum:
            - json
            - markdown
          default: json
    pageOutput:
      type: object
      description: Extracted content for a single page
      required:
        - url
      properties:
        url:
          type: string
          format: uri
          description: The URL of the extracted page
          example: https://example.com/article
        markdown:
          type: string
          description: >-
            Extracted markdown content of the page. Will be absent if extraction
            fails.
          example: |-
            # Article Title

            This is the extracted content...
          nullable: true
        error:
          type: string
          description: If extraction fails, a string describing the reason why.
    extractResponse:
      type: object
      description: Response containing extracted content
      required:
        - meta
        - data
      properties:
        meta:
          $ref: '#/components/schemas/meta'
        data:
          type: array
          description: Array of extracted page content
          items:
            $ref: '#/components/schemas/pageOutput'
        errors:
          type: array
          description: Optional array of errors that occurred during extraction
          items:
            $ref: '#/components/schemas/errorDetail'
  responses:
    unauthorized:
      description: Access token is missing or invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/errorEnvelope'
          examples:
            default:
              summary: Response with unauthorized error
              value:
                meta:
                  id: 69c3f5c4168f66b860e951c585550f1c
                  node: us-central1
                  ms: 213
                data: null
                error:
                  - code: '2'
                    url: https://help.kagi.com/api/errors#unauthorized
                    message: Unauthorized
                    location: null
tags:
  - name: Search
    x-displayName: Search API
    description: >
      The Search API is a feature-rich endpoint for search products and agents.
      It gives programmable access to Kagi's premium search results pulled from
      many different sources - including our in-house indexes - and re-ranked to
      surface accurate answers and interesting finds. You can read about our
      approach towards search [on our
      blog](https://blog.kagi.com/the-many-benefits-of-paying-for-search).


      The API supports most of the features that we offer through our web UI,
      including [Lenses](https://help.kagi.com/kagi/features/lenses.html).


      You can also request full markdown extraction of the top results in a
      single API request.
  - name: Extract
    x-displayName: Extract API
    description: >
      Extract contents from web pages, currently in markdown form. This endpoint
      accepts a list of URLs

      and returns the extracted markdown content for each page.
